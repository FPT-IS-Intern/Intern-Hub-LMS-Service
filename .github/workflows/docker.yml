name: Docker Build & Push to Docker Hub

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - 'infra/**'
      - 'core/**'
      - 'app/**'
      - 'libs.versions.toml'
      - 'build.gradle.kts'
      - 'Dockerfile'
      - '.github/workflows/docker.yml'

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Build and push image with Jib
        run: ./gradlew :api:jib -Djib.to.image=${{ secrets.DOCKERHUB_USERNAME }}/intern-hub-lms-service:latest -Djib.to.auth.username=${{ secrets.DOCKERHUB_USERNAME }} -Djib.to.auth.password=${{ secrets.DOCKERHUB_TOKEN }}
