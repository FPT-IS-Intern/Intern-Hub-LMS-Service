spring:
  application:
    name: inter-hub-lms-service
  datasource:
    url: jdbc:postgresql://localhost:5432/lms-service-db
    username: postgres
    password: root
    driverClassName: org.postgresql.Driver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: schema_lms
    hibernate:
      ddl-auto: validate
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml
    default-schema: schema_lms
    enabled: true

aws:
  s3:
    access-key: ${S3_ACCESS_KEY}
    secret-key: ${S3_SECRET_KEY}
    region: ${S3_REGION}
    end-point: ${S3_ENDPOINT}
    bucket-name: ${S3_BUCKET_NAME}

snowflake:
  worker-id: 10
  datacenter-id: 10