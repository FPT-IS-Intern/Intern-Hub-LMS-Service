spring:
  application:
    name: inter-hub-lms-service
  jmx:
    enabled: false
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driverClassName: org.postgresql.Driver
    hikari:
      minimum-idle: 1
      maximum-pool-size: 2
  jpa:
    open-in-view: false
    properties:
      hibernate:
        default_schema: ih_lms
    hibernate:
      ddl-auto: validate
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml
    default-schema: ih_lms
    enabled: true

server:
  tomcat:
    threads:
      max: 20
      min-spare: 2

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

security:
  public-paths: ${SECURITY_PUBLIC_PATHS:/actuator/health,/actuator/info}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

aws:
  s3:
    access-key: ${S3_ACCESS_KEY}
    secret-key: ${S3_SECRET_KEY}
    region: ${S3_REGION}
    end-point: ${S3_ENDPOINT}
    bucket-name: ${S3_BUCKET_NAME}
    bucket-url: ${S3_BUCKET_URL}
    paths:
      lesson: lessons/
      course: courses/
      submission: submissions/
    max-file-size: 20971520
    allow-types:
      image: "image/(png|jpeg|jpg)"
      document: "application/(pdf|msword|vnd.openxmlformats-officedocument.wordprocessingml.document|vnd.ms-excel|vnd.openxmlformats-officedocument.spreadsheetml.sheet)|image/(png|jpeg|jpg)"

common:
  context:
    enabled: true

snowflake:
  machine-id: 10

gateway-url: ${GATEWAY_URL}
