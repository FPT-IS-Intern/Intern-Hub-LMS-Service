spring:
  application:
    name: inter-hub-lms-service
  jmx:
    enabled: false
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driverClassName: org.postgresql.Driver
    hikari:
      minimum-idle: 1
      maximum-pool-size: 2
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  jpa:
    open-in-view: false
    properties:
      hibernate:
        default_schema: ih_lms
    hibernate:
      ddl-auto: validate
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml
    default-schema: ih_lms
    enabled: true

server:
  port: 8080
  tomcat:
    threads:
      max: 20
      min-spare: 2

management:
  endpoints:
    web:
      exposure:
        include: health,info
  tracing:
    enabled: false
  otlp:
    metrics:
      export:
        enabled: false
    tracing:
      export:
        enabled: false

otel:
  sdk:
    disabled: true

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true

audit:
  data:
    enabled: false

security:
  internal-secret: ${INTERNAL_SECRET_KEY}
  internal-path-prefix: /lms/internal/

feign:
  client:
    config:
      hrm:
        url: ${HRM_SERVICE_URL}

services:
  dms:
    url: ${DMS_SERVICE_URL}
    system-actor-id: ${DMS_SYSTEM_ACTOR_ID:0}

aws:
  s3:
    paths:
      lesson: lessons/
      course: courses/
      submission: submissions/
    max-total-size: 20971520
    allow-types:
      image: "image/(png|jpeg|jpg)"
      document: "application/(pdf|msword|vnd.openxmlformats-officedocument.wordprocessingml.document|vnd.ms-excel|vnd.openxmlformats-officedocument.spreadsheetml.sheet)|image/(png|jpeg|jpg)"

common:
  context:
    enabled: true

snowflake:
  machine-id: 10

logging:
  level:
    root: INFO
    com.intern.hub: INFO
    org.springframework: WARN
    org.springframework.web: WARN
    org.springframework.security: WARN
    org.hibernate: WARN
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN
    org.apache.catalina: WARN
    org.apache.coyote: WARN
    org.apache.tomcat: WARN
    liquibase: WARN

gateway-url: ${GATEWAY_URL}
