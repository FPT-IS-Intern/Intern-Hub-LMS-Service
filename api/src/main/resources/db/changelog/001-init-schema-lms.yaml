databaseChangeLog:
  - changeSet:
      id: 001-init-schema-lms
      author: admin
      changes:
        - sql:
            dbms: postgresql
            splitStatements: true
            stripComments: true
            sql: |
              -- ----------------------------
              -- Table structure for course_enrollments
              -- ----------------------------
              DROP TABLE IF EXISTS "schema_lms"."course_enrollments";
              CREATE TABLE "schema_lms"."course_enrollments" (
              "course_enrollment_id" int8 NOT NULL,
              "created_at" int8 NOT NULL,
              "created_by" varchar(50) COLLATE "pg_catalog"."default",
              "updated_at" int8,
              "updated_by" varchar(100) COLLATE "pg_catalog"."default",
              "version" int4,
              "course_progress" varchar(255) COLLATE "pg_catalog"."default" NOT NULL,
              "user_id" int8 NOT NULL,
              "course_id" int8 NOT NULL
              )
              ;
              
              -- ----------------------------
              -- Table structure for course_evaluators
              -- ----------------------------
              DROP TABLE IF EXISTS "schema_lms"."course_evaluators";
              CREATE TABLE "schema_lms"."course_evaluators" (
              "course_evaluator_id" int8 NOT NULL,
              "created_at" int8 NOT NULL,
              "created_by" varchar(50) COLLATE "pg_catalog"."default",
              "updated_at" int8,
              "updated_by" varchar(100) COLLATE "pg_catalog"."default",
              "version" int4,
              "user_id" int8 NOT NULL,
              "course_id" int8 NOT NULL
              )
              ;
              
              -- ----------------------------
              -- Table structure for course_lessons
              -- ----------------------------
              DROP TABLE IF EXISTS "schema_lms"."course_lessons";
              CREATE TABLE "schema_lms"."course_lessons" (
              "course_lesson_id" int8 NOT NULL,
              "created_at" int8 NOT NULL,
              "created_by" varchar(50) COLLATE "pg_catalog"."default",
              "updated_at" int8,
              "updated_by" varchar(100) COLLATE "pg_catalog"."default",
              "version" int4,
              "order_index" int4 NOT NULL,
              "course_id" int8 NOT NULL,
              "lesson_id" int8 NOT NULL
              )
              ;
              
              -- ----------------------------
              -- Table structure for course_positions
              -- ----------------------------
              DROP TABLE IF EXISTS "schema_lms"."course_positions";
              CREATE TABLE "schema_lms"."course_positions" (
              "course_position_id" int8 NOT NULL,
              "created_at" int8 NOT NULL,
              "created_by" varchar(50) COLLATE "pg_catalog"."default",
              "updated_at" int8,
              "updated_by" varchar(100) COLLATE "pg_catalog"."default",
              "version" int4,
              "position_id" int8 NOT NULL,
              "course_id" int8 NOT NULL
              )
