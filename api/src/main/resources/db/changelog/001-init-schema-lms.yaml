              "version" int4,
              "course_image_url" text COLLATE "pg_catalog"."default" NOT NULL,
              "description" text COLLATE "pg_catalog"."default" NOT NULL,
              "name" varchar(128) COLLATE "pg_catalog"."default" NOT NULL
              )
              ;
              
              -- ----------------------------
              -- Table structure for lesson_enrollments
              -- ----------------------------
